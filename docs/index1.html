<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hill View">
<title>Hill View Primary School — Reports</title>
<link rel="icon" type="image/png" href="badge.png">
<link rel="apple-touch-icon" href="badge.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand palette */
  --primary:#1e3a5f;
  --primary-dk:#0f1f35;
  --primary-md:#2d5282;
  --primary-lt:#e8edf5;
  --primary-xl:#f0f4fa;
  --accent:#b8932a;
  --accent-lt:#fdf4df;
  --accent-md:#c9a03a;

  /* Semantic */
  --success:#065f46;
  --success-lt:#d1fae5;
  --danger:#991b1b;
  --danger-lt:#fee2e2;
  --warn:#92400e;
  --warn-lt:#fef3c7;

  /* Neutrals */
  --bg:#f4f6fa;
  --surface:#ffffff;
  --surface-2:#f9fafc;
  --border:#dde2ec;
  --border-dk:#c4ccd8;
  --text:#1a1d23;
  --text-2:#374151;
  --muted:#6b7280;
  --muted-lt:#9ca3af;

  /* Radius */
  --r:8px;--rl:12px;--rx:16px;

  /* Shadows */
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --shadow-md:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
  --shadow-lg:0 20px 25px rgba(0,0,0,.1),0 10px 10px rgba(0,0,0,.04);
}

/* ── BASE ── */
body{
  font-family:'Source Sans 3',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  min-height:100vh;
  line-height:1.5;
  overflow-x:hidden;
}
img{max-width:100%;height:auto}
h1,h2,h3,.page-h,.section-h,.modal-h,.login-h1,.teach-name{
  font-family:'Outfit',system-ui,sans-serif;
  word-break:break-word;
}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}
.main{display:flex;flex:1;min-height:0;min-width:0}

/* ── NAVBAR ── */
.navbar{
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dk) 100%);
  color:#fff;
  display:flex;
  align-items:center;
  gap:1rem;
  padding:0 clamp(.75rem, 3vw, 1.5rem);
  height:58px;
  flex-shrink:0;
  box-shadow:0 2px 12px rgba(15,31,53,.45);
  position:relative;
  z-index:100;
}
.navbar::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,var(--accent) 0%,transparent 60%);
}
.nav-brand{
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:clamp(.875rem, 2.5vw, .96875rem);
  flex:1;
  letter-spacing:.01em;
  display:flex;
  align-items:center;
  gap:.625rem;
  min-width:0;
}
.nav-brand .brand-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  flex-shrink:0;
}
.nav-user{font-size:12px;opacity:.85;letter-spacing:.01em}
.badge-role{
  font-size:10.5px;
  background:rgba(184,147,42,.25);
  border:1px solid rgba(184,147,42,.4);
  color:#f5d98a;
  padding:clamp(.1875rem, .5vw, .25rem) clamp(.5rem, 1.5vw, .625rem);
  border-radius:20px;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:700;
  font-family:'Outfit',sans-serif;
  white-space:nowrap;
}
.btn-signout{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.9);
  padding:clamp(.25rem, 1vw, .3125rem) clamp(.625rem, 2vw, .875rem);
  border-radius:var(--r);
  cursor:pointer;
  font-size:12px;
  font-weight:500;
  transition:all .2s;
  letter-spacing:.02em;
  white-space:nowrap;
}
.btn-signout:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.35)}
.hamburger{
  display:none;
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
  padding:6px;
  border-radius:var(--r);
  transition:background .15s;
  flex-shrink:0;
}
.hamburger:hover{background:rgba(255,255,255,.15)}
.hamburger svg{width:22px;height:22px}
.sidebar-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  z-index:149;
}

/* ── SIDEBAR ── */
.main{display:flex;flex:1;min-height:0}
.sidebar{
  width:210px;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:1rem .5rem;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:2px;
  box-shadow:var(--shadow-sm);
}
.nav-section-label{
  font-family:'Outfit',sans-serif;
  font-size:10px;
  font-weight:700;
  color:var(--muted-lt);
  text-transform:uppercase;
  letter-spacing:.1em;
  padding:clamp(.5rem, 2vw, .625rem) clamp(.625rem, 2vw, .875rem) clamp(.3125rem, 1vw, .375rem);
  margin-top:4px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:.625rem;
  width:100%;
  padding:clamp(.4375rem, 1.5vw, .5625rem) clamp(.625rem, 2vw, .875rem);
  border:none;
  border-radius:var(--r);
  background:transparent;
  color:var(--muted);
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  text-align:left;
  transition:all .15s;
  position:relative;
  font-family:'Source Sans 3',sans-serif;
}
.nav-item .nav-icon{
  width:1.25rem;height:1.25rem;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  border-radius:5px;
  background:transparent;
  transition:background .15s;
}
.nav-item .nav-icon svg{width:100%;height:100%}
.nav-item:hover{background:var(--primary-lt);color:var(--primary)}
.nav-item:hover .nav-icon{background:rgba(30,58,95,.1)}
.nav-item.active{
  background:var(--primary-lt);
  color:var(--primary);
  font-weight:700;
}
.nav-item.active .nav-icon{background:rgba(30,58,95,.12)}
.nav-item.active::before{
  content:'';
  position:absolute;
  left:-8px;top:4px;bottom:4px;
  width:3px;
  border-radius:0 3px 3px 0;
  background:var(--accent);
}

/* ── CONTENT ── */
.content{flex:1;overflow:auto;padding:clamp(1rem, 3vw, 1.75rem) clamp(1rem, 3vw, 2rem);min-width:0;max-width:100vw}

/* ── INPUTS ── */
input,select,textarea{
  width:100%;
  padding:8px 12px;
  border:1.5px solid var(--border);
  border-radius:var(--r);
  font-size:13.5px;
  color:var(--text);
  background:var(--surface);
  outline:none;
  transition:border .15s,box-shadow .15s;
  font-family:'Source Sans 3',sans-serif;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--primary-md);
  box-shadow:0 0 0 3px rgba(30,58,95,.12);
}
input[type=number]{width:62px;text-align:center;padding:4px 5px;font-size:13px}
input.inline-num{width:62px;text-align:center;padding:4px 5px;font-size:13px}

/* ── BUTTONS ── */
.btn{
  padding:8px 18px;
  border-radius:var(--r);
  border:none;
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-family:'Source Sans 3',sans-serif;
  letter-spacing:.01em;
}
.btn-primary{
  background:var(--primary);
  color:#fff;
  box-shadow:0 1px 3px rgba(30,58,95,.3);
}
.btn-primary:hover{background:var(--primary-md);box-shadow:0 2px 6px rgba(30,58,95,.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn-ghost{
  background:transparent;
  border:1.5px solid var(--border-dk);
  color:var(--text-2);
}
.btn-ghost:hover{background:var(--primary-lt);border-color:var(--primary);color:var(--primary)}
.btn-danger{
  background:transparent;
  border:1.5px solid #fca5a5;
  color:var(--danger);
}
.btn-danger:hover{background:var(--danger-lt);border-color:var(--danger)}
.btn-accent{
  background:var(--accent);
  color:#fff;
  box-shadow:0 1px 3px rgba(184,147,42,.35);
}
.btn-accent:hover{background:var(--accent-md)}
.btn-sm{padding:5px 12px;font-size:12px}

/* ── CARDS ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rl);
  padding:clamp(.875rem, 2vw, 1.375rem);
  box-shadow:var(--shadow-sm);
  min-width:0;
  max-width:100%;
  overflow:hidden;
}

/* ── METRIC CARDS ── */
.mc-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:clamp(.625rem, 2vw, .875rem);margin-bottom:24px}
.mc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rl);
  padding:clamp(1rem, 2.5vw, 1.25rem);
  display:flex;
  flex-direction:column;
  gap:4px;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}
.mc::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,var(--primary) 0%,var(--accent) 100%);
}
.mc-val{
  font-family:'Outfit',sans-serif;
  font-size:clamp(1.375rem, 4vw, 1.75rem);
  font-weight:800;
  color:var(--primary);
  line-height:1;
}
.mc-lbl{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500;letter-spacing:.02em}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);max-width:100%}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  padding:clamp(.5rem, 2vw, .625rem) clamp(.625rem, 2vw, .75rem);
  background:var(--primary-xl);
  font-family:'Outfit',sans-serif;
  font-weight:700;
  color:var(--primary);
  text-align:left;
  border-bottom:2px solid var(--border);
  white-space:nowrap;
  font-size:11.5px;
  text-transform:uppercase;
  letter-spacing:.05em;
}
tbody td{
  padding:clamp(.4375rem, 1.5vw, .5625rem) clamp(.625rem, 2vw, .75rem);
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--primary-xl)}
.sticky-col{position:sticky;left:0;background:var(--surface);z-index:1;font-weight:600}
thead .sticky-col{background:var(--primary-xl)}

/* ── SCORE BADGES ── */
.sb{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:700;font-family:'Outfit',sans-serif}
.sb-a{background:#d1fae5;color:#064e3b}
.sb-b{background:#dbeafe;color:#1e3a8a}
.sb-c{background:#fef3c7;color:#78350f}
.sb-f{background:#fee2e2;color:#7f1d1d}
.pb{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:800;font-family:'Outfit',sans-serif}
.pb-1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.pb-2{background:linear-gradient(135deg,#9ca3af,#6b7280);color:#fff}
.pb-n{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
.grade-b{display:inline-block;padding:3px 14px;border-radius:20px;font-size:13px;font-weight:800;font-family:'Outfit',sans-serif}

/* ── LOGIN ── */
.login-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#e8edf5;
  position:relative;
  overflow:hidden;
}
.login-wrap::before{
  content:'';
  position:absolute;
  inset:0;
  background:url('badge.png') center/contain no-repeat;
  opacity:.06;
  pointer-events:none;
}
.login-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rx);
  padding:clamp(1.5rem, 5vw, 2.5rem) clamp(1.25rem, 4vw, 2.25rem);
  width:min(400px,95vw);
  max-width:95vw;
  position:relative;
  z-index:1;
  box-shadow:var(--shadow-lg);
}
.login-logo{
  width:3.75rem;height:3.75rem;
  border-radius:1rem;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  box-shadow:0 4px 14px rgba(30,58,95,.4);
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-md) 100%);
  overflow:hidden;
  padding:4px;
}
.login-logo img{width:100%;height:100%;object-fit:contain;border-radius:12px}
.login-h1{
  font-size:clamp(1.25rem, 4vw, 1.375rem);
  font-weight:800;
  text-align:center;
  margin-bottom:4px;
  color:var(--primary);
}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;font-weight:400}
.login-divider{
  height:1px;
  background:var(--border);
  margin:20px 0;
  position:relative;
}
.field{margin-bottom:16px}
.field label{
  display:block;
  font-size:11.5px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-family:'Outfit',sans-serif;
}
.err-box{
  font-size:12.5px;
  color:var(--danger);
  padding:clamp(.5rem, 2vw, .625rem) clamp(.75rem, 2.5vw, .875rem);
  background:var(--danger-lt);
  border:1px solid #fca5a5;
  border-radius:var(--r);
  margin-bottom:14px;
  white-space:pre-line;
  line-height:1.6;
}

/* ── MISC ── */
.page-h{
  font-size:clamp(1.125rem, 3.5vw, 1.375rem);
  font-weight:800;
  color:var(--primary);
  margin-bottom:22px;
  letter-spacing:-.01em;
}
.section-h{
  font-size:clamp(.75rem, 2vw, .8125rem);
  font-weight:700;
  color:var(--muted);
  margin-bottom:14px;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.pill{
  font-size:11.5px;
  background:var(--primary-lt);
  color:var(--primary);
  padding:3px 12px;
  border-radius:20px;
  font-weight:700;
  display:inline-block;
  font-family:'Outfit',sans-serif;
}
.pill-grey{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
.pill-accent{background:var(--accent-lt);color:var(--accent)}
.hdr-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;min-width:0}
.save-toast{
  position:fixed;bottom:1.75rem;right:1.75rem;
  background:var(--primary);
  color:#fff;
  padding:.75rem 1.375rem;
  border-radius:var(--r);
  font-size:13px;
  font-weight:700;
  opacity:0;
  transition:opacity .3s,transform .3s;
  pointer-events:none;
  z-index:9999;
  transform:translateY(.5rem);
  box-shadow:var(--shadow-md);
  font-family:'Outfit',sans-serif;
  max-width:calc(100vw - 2rem);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.save-toast.show{opacity:1;transform:translateY(0)}
.save-toast.err{background:var(--danger)}
.spin{
  display:inline-block;
  width:16px;height:16px;
  border:2.5px solid rgba(0,0,0,.12);
  border-top-color:currentColor;
  border-radius:50%;
  animation:sp .7s linear infinite;
  vertical-align:middle;
}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{
  display:flex;
  align-items:center;
  justify-content:center;
  flex:1;
  gap:12px;
  color:var(--muted);
  padding:clamp(2rem, 8vw, 3.75rem);
  font-size:14px;
}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px;min-width:0}
.empty{
  padding:clamp(1.5rem, 5vw, 2.5rem);
  text-align:center;
  color:var(--muted-lt);
  font-size:13.5px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.empty-icon{font-size:2rem;opacity:.5}
.msg-ok{font-size:12.5px;color:var(--success);background:var(--success-lt);padding:7px 12px;border-radius:var(--r);font-weight:500}
.msg-err{font-size:12.5px;color:var(--danger);background:var(--danger-lt);padding:7px 12px;border-radius:var(--r);font-weight:500}
.inline-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.inline-form input{flex:1;min-width:11.25rem}
.marks-actions{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;min-width:0}
.changed-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);display:inline-block;margin-left:4px;vertical-align:middle}

/* ── PUPIL/TEACHER MANAGEMENT ── */
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-bottom:16px}
.avatar-card{
  text-align:center;
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:clamp(.5rem, 2vw, .75rem) clamp(.375rem, 1.5vw, .5rem);
  cursor:pointer;
  transition:all .15s;
  background:var(--surface);
}
.avatar-card:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(30,58,95,.12)}
.avatar-card.selected{border-color:var(--primary);border-width:2px;background:var(--primary-lt)}
.avatar-img{
  width:4rem;height:4rem;border-radius:50%;
  object-fit:cover;
  background:var(--primary-lt);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:800;
  color:var(--primary);
  margin:0 auto 8px;
  overflow:hidden;
  font-family:'Outfit',sans-serif;
}
.avatar-img img{width:100%;height:100%;object-fit:cover}
.avatar-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 8px);margin:0 auto}
.upload-zone{
  border:2px dashed var(--border-dk);
  border-radius:var(--r);
  padding:clamp(1rem, 3vw, 1.5rem);
  text-align:center;
  cursor:pointer;
  transition:all .15s;
}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:var(--primary-lt)}
.upload-zone input{display:none}
.upload-hint{font-size:12px;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{margin-bottom:14px}
.form-group label{
  display:block;
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-family:'Outfit',sans-serif;
}
.form-group input,.form-group select{width:100%}
.action-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;min-width:0}

/* ── TEACHER CARD ── */
.teach-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rl);
  padding:clamp(1rem, 2.5vw, 1.125rem) clamp(1rem, 2.5vw, 1.25rem);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:1rem;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s,border-color .15s;
}
.teach-card:hover{border-color:var(--border-dk);box-shadow:var(--shadow)}
.teach-avatar{
  width:3.5rem;height:3.5rem;border-radius:50%;
  object-fit:cover;
  background:var(--primary-lt);
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;font-weight:800;
  color:var(--primary);
  flex-shrink:0;overflow:hidden;
  font-family:'Outfit',sans-serif;
  border:2px solid var(--border);
}
.teach-avatar img{width:100%;height:100%;object-fit:cover}

<script>

// ══════════════════════════════════════════════════
//  CONFIG — matches hill-view-ps Supabase project
// ══════════════════════════════════════════════════
const SUPA_URL = 'https://gtguutliwmhntuigcqta.supabase.co';
const SUPA_KEY = 'sb_publishable_32CnYot-3Kn2ysRljL9-zQ_G5r_QqLI';
const BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
let CLOUDINARY = { cloudName: 'dkh8e8upn', apiKey: '666746752822281', apiSecret: 'Qg5lWT8QKPmlmHXJ-i4cYwUcvBY' };
const db = supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { redirectTo: BASE_URL }
});

// ══════════════════════════════════════════════════
//  SCHEMA KNOWLEDGE (matches seed.sql exactly)
//  Subject levels: 'nursery' | 'p1-p3' | 'p4-p7'
//  Class→level:  KG* → nursery, P1/P2/P3 → p1-p3, P4+ → p4-p7
//  P7 grade: class name starts with 'P7'
// ══════════════════════════════════════════════════
const resolveLevel = name => {
  if (name.startsWith('KG'))  return 'nursery';
  if (/^P[123]/.test(name))   return 'p1-p3';
  return 'p4-p7';
};
const isP7Class = name => /^P7/.test(name);

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
const S = {
  user: null,          // from users table
  view: 'overview',
  // data
  classes: [], subjects: [], pupils: [], marksMap: {}, commentsMap: {},
  // admin analytics (from views)
  classPerf: [], submissions: [],
  // teacher
  selClass: null,      // admin class selector
  teacherClassIds: [], // teacher's assigned classes
  pending: {},         // `${pupil_id}::${subject_id}` → score (unsaved)
  saving: false,
  saveMsg: null,
  // report page
  reportPupils: [],
  reportSelId: null,
  reportSummary: null,
  reportSubjects: [],
  // pupil management
  pupilsList: [],
  selPupilClass: null,
  pupilSearch: '',
  editingPupil: null,
  // teacher management
  teachersList: [],
  teachersLoaded: false,
  pupilsLoaded: false,
  teacherSearch: '',
  editingTeacher: null,
  // settings
  termSettings: null,
  // ui
  loading: true,
  chartInst: null,
  toastTimer: null,
};

// ══════════════════════════════════════════════════
//  CALC (client-side live recalc from pending edits)
// ══════════════════════════════════════════════════
const toAgg    = s => s>=90?1:s>=80?2:s>=70?3:s>=60?4:s>=50?5:s>=40?6:s>=30?7:8;
const pleGrade = t => t===4?'D1':t<=6?'D2':t<=8?'C3':t<=10?'C4':t<=12?'P5':t<=14?'P6':t<=16?'P7':'F9';
const gradeStyle = g => {
  if(['D1','D2'].includes(g)) return'background:#d1f0dc;color:#0a4f24';
  if(['C3','C4','C5','C6'].includes(g)) return'background:#d0e8ff;color:#0a3a6b';
  if(['P5','P6','P7','P8'].includes(g)) return'background:#fff3cd;color:#7a5300';
  return'background:#fde0e0;color:#7a1111';
};
const scoreClass = v => v>=80?'sb-a':v>=60?'sb-b':v>=40?'sb-c':'sb-f';
const scoreLabel = v => v>=80?'Excellent':v>=60?'Good':v>=40?'Average':'Needs Improvement';

const markKey = (pid, sid) => `${pid}::${sid}`;
const getScore = (pid, sid) => {
  const k = markKey(pid, sid);
  return S.pending[k] !== undefined ? S.pending[k] : (S.marksMap[k] ?? 0);
};
const getComment = (pid, sid) => {
  const k = markKey(pid, sid);
  return S.commentsMap[k] || '';
};

function classSubs(classId) {
  const cls = S.classes.find(c=>c.id===classId);
  if(!cls) {
    console.warn('Class not found in S.classes:', classId, '| Available classes:', S.classes.map(c=>c.id));
    return [];
  }
  const level = resolveLevel(cls.name || '');
  const subs = S.subjects.filter(s=>s.level===level);
  if (!subs.length) {
    console.warn('No subjects found for level:', level, '| Class:', cls.name, '| Available levels:', [...new Set(S.subjects.map(s=>s.level))]);
  }
  return subs;
}

function rankPupils(classId) {
  const subs = classSubs(classId);
  return S.pupils.filter(p=>p.class_id===classId)
    .map(p=>{
      const scores = subs.map(s=>getScore(p.id,s.id));
      const total  = scores.reduce((a,b)=>a+b,0);
      const avg    = subs.length?total/subs.length:0;
      return{...p,scores,total,avg};
    })
    .sort((a,b)=>b.avg-a.avg)
    .map((p,i)=>({...p,pos:i+1}));
}

function pleCalc(pupilId, classId) {
  const subs = classSubs(classId); // p4-p7 level subs
  const aggs = subs.map(s=>({s,sc:getScore(pupilId,s.id),ag:toAgg(getScore(pupilId,s.id))}));
  const best4= [...aggs].sort((a,b)=>a.ag-b.ag).slice(0,4);
  const tot  = best4.reduce((s,a)=>s+a.ag,0);
  return{aggs,best4,tot,grade:pleGrade(tot)};
}

// ══════════════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════════════
async function loadAll() {
  if (!S.user) { S.loading=false; render(); return; }

  S.loading=true; render();

  // Core tables
  const [clsR,subR] = await Promise.all([
    db.from('classes').select('id,name').order('name'),
    db.from('subjects').select('id,name,level').order('name'),
  ]);
  S.classes  = clsR.data  || [];
  S.subjects  = subR.data  || [];
  console.log('Classes loaded:', S.classes.length, '| Subjects loaded:', S.subjects.length);
  if (clsR.error) console.error('Error loading classes:', clsR.error);

  // If no classes loaded, try once more with simpler query
  if (S.classes.length === 0) {
    console.warn('No classes loaded, retrying...');
    const {data: retryData, error: retryErr} = await db.from('classes').select('*');
    if (retryData && retryData.length > 0) {
      S.classes = retryData;
      console.log('Retry successful, classes:', S.classes.length);
    } else if (retryErr) {
      console.error('Retry failed:', retryErr);
    }
  }

  // Load teacher classes FIRST - IMPORTANT for teachers
  S.teacherClassIds = [];
  if (S.user.role === 'teacher') {
    try {
      const {data: tcData, error: tcErr} = await db.from('teacher_classes')
        .select('class_id,classes(name)')
        .eq('teacher_id', S.user.id);

      if (tcErr) {
        console.error('Failed to load teacher_classes:', tcErr);
      } else {
        S.teacherClassIds = (tcData || []).map(tc => tc.class_id).filter(Boolean);
      }

      // Fallback: if no teacher_classes entries, use legacy class_id from users table
      if (S.teacherClassIds.length === 0 && S.user.class_id) {
        console.warn('No teacher_classes found, using legacy class_id:', S.user.class_id);
        S.teacherClassIds = [S.user.class_id];
      }

      // Ensure all teacher class IDs are in S.classes (add from teacher_classes data)
      if (tcData && tcData.length > 0) {
        tcData.forEach(tc => {
          if (tc.class_id && tc.classes?.name && !S.classes.find(c => c.id === tc.class_id)) {
            console.log('Adding class from teacher_classes:', tc.class_id, tc.classes.name);
            S.classes.push({ id: tc.class_id, name: tc.classes.name });
          }
        });
      }

      // Initialize selClass if not set
      if (!S.selClass || !S.teacherClassIds.includes(S.selClass)) {
        S.selClass = S.teacherClassIds[0] || null;
        console.log('Initialized selClass to:', S.selClass);
      }

      console.log('Teacher class IDs loaded:', S.teacherClassIds);
      console.log('Classes after adding:', S.classes.map(c => c.id));
    } catch(err) {
      console.error('Exception loading teacher classes:', err);
    }
  }

  // Load pupils - filter by teacher's classes if teacher role
  let pupR;
  if (S.user.role === 'teacher') {
    if (S.teacherClassIds.length > 0) {
      // Only load pupils from teacher's assigned classes
      pupR = await db.from('pupils')
        .select('id,name,class_id,avatar,house,paycode')
        .in('class_id', S.teacherClassIds)
        .order('name');
    } else {
      // No classes assigned - empty result
      pupR = { data: [], error: null };
    }
  } else {

async function saveTermSettings(term, termStart, termEnd, nextTermStart) {

    term,

async function saveMarks() {
  const updates = Object.entries(S.pending).map(([k,score])=>{
    const [pupil_id,subject_id]=k.split('::');
    return{pupil_id,subject_id,score:parseInt(score)||0};
  });
  if(!updates.length){S.saveMsg='No changes to save.';render();return;}
  S.saving=true; S.saveMsg='Saving marks to database...'; render();
  const {data:{user}} = await db.auth.getUser();
  if(!user){S.saving=false;S.saveMsg='Error: Not logged in';render();flashToast('Error: Not logged in', 'err');return;}
  const payload = updates.map(u=>({...u,teacher_id:user.id}));
  try {
    const {error, data} = await db.from('marks').upsert(payload,{onConflict:'pupil_id,subject_id'}).select();
    S.saving=false;
    if(error){
      S.saveMsg='Error: '+error.message;
      flashToast('Error saving marks: ' + error.message, 'err');
      alert('Save failed: ' + error.message);
    } else {
      updates.forEach(u=>{ S.marksMap[markKey(u.pupil_id,u.subject_id)]=u.score; });
      S.pending={}; S.saveMsg=`Successfully saved ${updates.length} mark(s)!`;
      flashToast(`Successfully saved ${updates.length} mark(s)!`, 'ok');
      
      // Auto-generate teacher comments based on average
      await autoGenerateTeacherComments(updates);
    }
  } catch(e) {
    S.saving=false;
    S.saveMsg='Error: '+e.message;
    flashToast('Error: ' + e.message, 'err');
    alert('Save failed: ' + e.message);
  }
  render();
}

async function autoGenerateTeacherComments(savedUpdates) {
  const classId = S.selClass || S.classes[0]?.id;
  if (!classId) return;
  
  const classPupils = S.pupils.filter(p => p.class_id === classId);
  const classSubjects = S.subjects.filter(s => {
    const clsObj = S.classes.find(c => c.id === classId);
    const lvl = resolveLevel(clsObj?.name || '').toLowerCase();
    return s.level?.toLowerCase() === lvl;
  });
  
  for (const pupil of classPupils) {
    let total = 0, count = 0;
    for (const subj of classSubjects) {
      const score = S.marksMap[markKey(pupil.id, subj.id)];
      if (score !== undefined) {
        total += score;
        count++;
      }
    }
    if (count === 0) continue;
    
    const avg = Math.round(total / count);
    let comment = '';
    if (avg >= 90) comment = 'Excellent performance! Keep it up.';
    else if (avg >= 80) comment = 'Very good work. Continue striving for excellence.';
    else if (avg >= 70) comment = 'Good effort. Aim higher next term.';
    else if (avg >= 60) comment = 'Fair performance. More effort needed.';
    else if (avg >= 50) comment = 'Pass. Work harder to improve.';
    else comment = 'Needs improvement. Attend extra lessons.';
    
    // Update comment in database for all subjects of this pupil
    for (const subj of classSubjects) {
      await db.from('marks').update({teacher_comment: comment}).eq('pupil_id', pupil.id).eq('subject_id', subj.id);
    }
  }
}

function setPending(pid, sid, val) {
  const v = Math.max(0,Math.min(100,parseInt(val)||0));
  S.pending[markKey(pid,sid)]=v;
  // live-update avg/pos/grade/remark in DOM without full re-render
  refreshLiveRow(pid, sid);
}

function refreshLiveRow(pid, sid) {
  const p = S.pupils.find(x=>x.id===pid); if(!p) return;
  const cid=p.class_id;
  const cls=S.classes.find(c=>c.id===cid);
  const p7=cls&&isP7Class(cls.name);

  // Update grade and remark
  const score=getScore(pid,sid);
  const grade=reportGrade(score);
  const remark=gradeRemark(grade);
  const gradeEl=document.getElementById(`grade-${pid}-${sid}`);
  if(gradeEl){gradeEl.innerHTML='';const gs=e('span',{class:'sb',style:gradeStyle(grade)});gs.textContent=grade;gradeEl.appendChild(gs);}
  const remarkEl=document.getElementById(`remark-${pid}-${sid}`);
  if(remarkEl){remarkEl.textContent=remark;}

  rankPupils(cid).forEach(rp=>{
    const goodColor=rp.avg>=60?'var(--primary)':'var(--danger)';
    const te=document.getElementById(`tot-${rp.id}`); if(te){te.textContent=rp.total;te.style.color=goodColor;}
    const ae=document.getElementById(`avg-${rp.id}`); if(ae){ae.textContent=rp.avg.toFixed(1);ae.style.color=goodColor;}
    const pe=document.getElementById(`pos-${rp.id}`); if(pe){pe.innerHTML='';pe.appendChild(mkPosB(rp.pos));}
    if(p7){const ge=document.getElementById(`grade-${rp.id}`);if(ge){const pd=pleCalc(rp.id,cid);ge.innerHTML='';const s=e('span',{class:'grade-b',style:gradeStyle(pd.grade)});s.textContent=pd.grade;ge.appendChild(s);}}
  });
}

function flashToast(msg, type) {
  if(S.toastTimer) clearTimeout(S.toastTimer);
  const t=document.getElementById('toast');
  if(t){
    t.textContent=msg || 'Saved';
    t.className='save-toast show '+(type || '');
    S.toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
  }
}

];

const SUBJECT_ALIASES = {
  'English': ['English Language', 'English'],
  'Mathematics': ['Mathematics'],
  'Social Studies and RE': ['Social Studies', 'Social Studies and RE', 'RE', 'Religious Education'],
  'Integrated Science': ['Science', 'Integrated Science'],
  'Computer Studies': ['Computer Studies', 'ICT', 'ICT / Computer Studies', 'Computing'],
  'Practical Work': ['Practical Work', 'Agriculture', 'Home Economics', 'Creative Arts']
};

function escapeHtml(val) {
  return String(val ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function normKey(val) {
  return String(val || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
}

function pickScore(subjectMap, aliases) {
  for (const alias of aliases) {
    const key = normKey(alias);
    if (subjectMap[key] != null) return subjectMap[key];
    const fuzzy = Object.entries(subjectMap).find(([k]) => k.includes(key) || key.includes(k));
    if (fuzzy) return fuzzy[1];
  }
  return null;
}

function mapSubjectScores(subjects) {
  const out = {};
  (subjects || []).forEach(s => { out[normKey(s.subject_name)] = Number(s.score); });
  return out;
}

function reportGrade(score) {
  if (score >= 95) return 'D1';
  if (score >= 80) return 'D2';
  if (score >= 70) return 'C3';
  if (score >= 60) return 'C4';
  if (score >= 50) return 'C5';
  if (score >= 45) return 'C6';
  if (score >= 40) return 'P7';
  if (score >= 35) return 'P8';
  return 'F9';
}

function gradeRemark(grade) {
  const m = { D1:'Exceptional', D2:'Excellent', C3:'Very Good', C4:'Good', C5:'Fairly Good', C6:'Competent', P7:'Pass', P8:'Weak', F9:'Not Achieved' };
  return m[grade] || '';
}

function scoreToBand(score) {
  if (score == null || Number.isNaN(score)) return '#e0e0e0';
  if (score >= 85) return '#f5c518';
  if (score >= 70) return '#dc3545';
  if (score >= 50) return '#198754';
  return '#0d6efd';
}

function reportOutOf(className) {
  const cls = S.classes.find(c => c.name === className);
  return cls ? rankPupils(cls.id).length : '';
}

function generateAllReports(filterClass) {
  const pupils = filterClass ? S.pupils.filter(p => p.class_id === filterClass) : S.pupils;
  if (!pupils.length) { alert('No pupils to generate reports for.'); return; }
  const ts = S.termSettings || { term: '', term_start: '', term_end: '', next_term_start: '' };
  const pages = pupils.map(p => {
    const cls = S.classes.find(c => c.id === p.class_id);
    const subs = classSubs(p.class_id);
    const ranked = rankPupils(p.class_id);
    const rp = ranked.find(r => r.id === p.id) || { pos: '-', total: 0, avg: 0 };
    const isP7 = cls && /^P7/.test(cls.name);
    const summary = {
      pupil_name: p.name,
      pupil_avatar: p.avatar || null,
      class_name: cls?.name || '',
      house: p.house || '',
      paycode: p.paycode || '',
      total_score: rp.total,
      average_score: rp.avg,
      position: rp.pos,
      uneb_grade: isP7 ? pleCalc(p.id, p.class_id).grade : null,
      term: ts.term || '',
      term_start: ts.term_start || '',
      term_end: ts.term_end || '',
      next_term_start: ts.next_term_start || '',
    };
    return buildReportHtml(summary, subs.map(s => ({ subject_name: s.name, score: getScore(p.id, s.id), teacher_comment: getComment(p.id, s.id) })));
  });
  openReportWindow(`Hill View - All Reports (${pupils.length} pupils)`, pages.join(''));
}


function e(tag,attrs,...kids){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='class')el.className=v;
    else if(k==='style')el.style.cssText=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  kids.flat().forEach(c=>{if(c!=null)el.append(typeof c==='string'?c:c);});
  return el;
}
const d=(cls,st,...ch)=>e('div',{class:cls||'',style:st||''},...ch);
const mkSB  = v=>{const s=e('span',{class:`sb ${scoreClass(v)}`});s.textContent=v;return s;};
const mkPosB= p=>{const s=e('span',{class:`pb ${p===1?'pb-1':p<=3?'pb-2':'pb-n'}`});s.textContent=`#${p}`;return s;};

//  EXCEL MARKS TABLE
//  readOnly=false → editable inputs with live avg/pos
//  readOnly=true  → badges (summary view)
//  showAddPupil   → bottom-row add-pupil panel
// ══════════════════════════════════════════════════
function MarksTable(classId, readOnly, showAddPupil) {
  const subs   = classSubs(classId);
  const ranked = rankPupils(classId);
  const cls    = S.classes.find(c=>c.id===classId);
  const p7     = cls && isP7Class(cls.name);
  const canAdd  = showAddPupil !== false && !readOnly;

  if (!subs.length && !ranked.length) {
    const msg=d('empty'); msg.textContent='No pupils or subjects found for this class.'; return msg;
  }
  if (!subs.length) {
    const msg=d('empty'); msg.textContent='No subjects configured for this level.'; return msg;
  }

  // ── outer wrapper
  const outer = d('');

  // ── excel table
  const wrap = d('excel-wrap');
  const tbl  = e('table',{class:'excel-tbl'});

  // ── thead
  const thead = document.createElement('thead');
  const hr    = document.createElement('tr');
  const thN   = e('th',{class:'name-col'}); thN.textContent='Pupil Name'; hr.appendChild(thN);
  subs.forEach(s=>{
    const th=document.createElement('th');
    th.textContent = s.name.length>13 ? s.name.slice(0,11)+'…' : s.name;
    th.title = s.name; hr.appendChild(th);
    // Grade header
    const thG=document.createElement('th');
    thG.textContent='Grade';
    thG.style.cssText='width:55px;text-align:center';
    hr.appendChild(thG);
    // Remark header
    const thR=document.createElement('th');
    thR.textContent='Remark';
    thR.style.cssText='min-width:100px';
    hr.appendChild(thR);
  });
  const statCols = ['Total','Avg','Pos',...(p7?['Grade']:[]),'Report'];
  const colCount = 1 + (subs.length * 3) + statCols.length;
  statCols.forEach(h=>{
    const th=document.createElement('th');
    th.textContent=h;
    th.style.background='#d8ead8';
    hr.appendChild(th);
  });
  thead.appendChild(hr); tbl.appendChild(thead);

  // ── tbody
  const tbody = document.createElement('tbody');

  if (!ranked.length) {
    const tr=document.createElement('tr');
    const td=e('td',{colspan:String(colCount),style:'padding:20px;text-align:center;color:var(--muted);font-style:italic'});
    td.textContent='No pupils enrolled yet. Use the panel below to add the first pupil.';
    tr.appendChild(td); tbody.appendChild(tr);
  }

  ranked.forEach((p,rowIdx)=>{
    const tr=document.createElement('tr');

    // name
    const tdN=e('td',{class:'name-col'});
    const nameWrap=d('','display:flex;align-items:center;gap:6px;min-width:0');
    const rowNum=e('span',{style:'font-size:10px;color:var(--muted);min-width:16px;text-align:right'}); rowNum.textContent=rowIdx+1;
    const nm=e('span'); nm.textContent=p.name; nameWrap.appendChild(rowNum); nameWrap.appendChild(nm); tdN.appendChild(nameWrap); tr.appendChild(tdN);

    // score cells + comments
    subs.forEach(s=>{
      const td=e('td',{class:'input-cell'});
      const val=getScore(p.id,s.id);
      if(readOnly){
        td.style.cssText='padding:5px 6px;text-align:center';
        td.appendChild(mkSB(val));
      } else {
        const isPending = S.pending[markKey(p.id,s.id)]!==undefined;
        const inp=e('input',{
          type:'number',min:'0',max:'100',step:'1',value:val,
          class:'xcel-inp'+(isPending?' changed':''),
          title:`${p.name} — ${s.name}`
        });
        inp.addEventListener('focus',()=>inp.select());
        inp.addEventListener('input',ev=>{
          inp.classList.add('changed');
          setPending(p.id,s.id,ev.target.value);
        });
        inp.addEventListener('keydown',ev=>{
          if(ev.key==='Enter'||ev.key==='Tab'){
            ev.preventDefault();
            const allInps=[...document.querySelectorAll('.xcel-inp, .cmt-inp')];
            const idx=allInps.indexOf(inp);
            const next=allInps[idx+1]; if(next)next.focus();
          }
        });
        td.appendChild(inp);
      }
      tr.appendChild(td);

      // Grade cell
      const tdG=e('td',{class:'stat-col', id:`grade-${p.id}-${s.id}`});
      const score=getScore(p.id,s.id);
      const grade=reportGrade(score);
      const gs=e('span',{class:'sb',style:gradeStyle(grade)}); gs.textContent=grade; tdG.appendChild(gs);
      tr.appendChild(tdG);

      // Remark cell
      const tdR=e('td',{class:'stat-col', id:`remark-${p.id}-${s.id}`});
      tdR.style.cssText='font-size:11px;color:var(--muted);white-space:nowrap';
      const remark=gradeRemark(grade);
      tdR.textContent=remark;
      tr.appendChild(tdR);
    });

    // Total
    const tdTot=e('td',{class:'stat-col'});
    const totEl=e('span',{id:`tot-${p.id}`,style:`font-size:13px;font-weight:700;color:${p.avg>=60?'var(--primary)':'var(--danger)'}`}); totEl.textContent=p.total; tdTot.appendChild(totEl); tr.appendChild(tdTot);

    // Avg
    const tdA=e('td',{class:'stat-col'});
    const avgEl=e('strong',{id:`avg-${p.id}`,style:`color:${p.avg>=60?'var(--primary)':'var(--danger)'}`}); avgEl.textContent=p.avg.toFixed(1); tdA.appendChild(avgEl); tr.appendChild(tdA);

    // Pos
    const tdP=e('td',{id:`pos-${p.id}`,class:'stat-col'}); tdP.appendChild(mkPosB(p.pos)); tr.appendChild(tdP);

    // P7 grade
    if(p7){
      const tdG=e('td',{id:`grade-${p.id}`,class:'stat-col'});
      const pd=pleCalc(p.id,classId);
      const gs=e('span',{class:'grade-b',style:gradeStyle(pd.grade)}); gs.textContent=pd.grade; tdG.appendChild(gs); tr.appendChild(tdG);
    }

    // Report btn
    const tdB=e('td',{class:'act-col'});
    const btn=e('button',{class:'btn btn-ghost btn-sm'}); btn.textContent='PDF';
    btn.addEventListener('click',()=>{
      const sum={pupil_name:p.name,pupil_avatar:p.avatar||null,class_name:cls?.name||'',house:p.house||'',paycode:p.paycode||'',total_score:p.total,average_score:p.avg,position:p.pos,uneb_grade:p7?pleCalc(p.id,classId).grade:null};
      printReport(sum, subs.map(s=>({subject_name:s.name,score:getScore(p.id,s.id)})));
    }); tdB.appendChild(btn); tr.appendChild(tdB);

    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody); wrap.appendChild(tbl); outer.appendChild(wrap);

  // ── Add-pupil panel (bottom of excel block)
  if(canAdd){
    const panel=d('add-pupil-panel');
    const icon=e('span',{style:'font-size:1.125rem;flex-shrink:0;line-height:1'}); icon.textContent='＋';
    const nameIn=e('input',{type:'text',placeholder:'New pupil full name…',style:'flex:1;max-width:min(280px,100%)'});
    const addBtn=e('button',{class:'btn btn-primary btn-sm'}); addBtn.textContent='Add Pupil';
    const msg=e('span',{style:'font-size:12px;color:var(--muted)'});

    const doAdd=async()=>{
      const nm=nameIn.value.trim(); if(!nm){msg.textContent='Enter a name first.';return;}
      addBtn.disabled=true; addBtn.innerHTML='<span class="spin"></span>';
      const err=await addPupil(nm,classId);
      if(err){msg.textContent='Error: '+err;addBtn.disabled=false;addBtn.textContent='Add Pupil';}
      else{msg.textContent='';nameIn.value='';nameIn.focus();}
    };
    addBtn.addEventListener('click',doAdd);
    nameIn.addEventListener('keydown',ev=>{if(ev.key==='Enter')doAdd();});
    panel.appendChild(icon); panel.appendChild(nameIn); panel.appendChild(addBtn); panel.appendChild(msg);
    outer.appendChild(panel);
  }

  return outer;
}

      if (!teacherMap[row.teacher_name]) {
        teacherMap[row.teacher_name] = [];
      }
      teacherMap[row.teacher_name].push(row);
    });

    const wrap=d('tbl-wrap');
    const tbl=document.createElement('table');
    const thead=document.createElement('thead'),hr=document.createElement('tr');
    ['Teacher','Class','Subjects Entered','Progress'].forEach(h2=>{const th=document.createElement('th');th.textContent=h2;hr.appendChild(th);});
    thead.appendChild(hr); tbl.appendChild(thead);
    const tbody=document.createElement('tbody');

    // Render grouped by teacher
    Object.entries(teacherMap).forEach(([teacherName, rows]) => {
      rows.forEach((row, idx) => {
        const tr=document.createElement('tr');
        // Only show teacher name on first row
        if (idx === 0) {
          const tdT=document.createElement('td');
          tdT.rowSpan = rows.length;
          tdT.textContent = teacherName;
          tdT.style.fontWeight = '500';
          tr.appendChild(tdT);
        }
        const pct=row.subject_count>0?Math.round((row.subjects_entered/row.subject_count)*100):0;
        [row.class_name,`${row.subjects_entered}/${row.subject_count}`].forEach(txt=>{
          const td=document.createElement('td'); td.textContent=txt; tr.appendChild(td);
        });
        const tdP=document.createElement('td');
        const bar=d('sub-bar'); const fill=d('sub-fill'); fill.style.width=pct+'%'; bar.appendChild(fill);
        const pctTxt=e('div',{style:'font-size:11px;color:var(--muted);margin-top:2px'}); pctTxt.textContent=pct+'%'; tdP.appendChild(bar); tdP.appendChild(pctTxt);
        tr.appendChild(tdP);
        tbody.appendChild(tr);
      });
    });

    tbl.appendChild(tbody); wrap.appendChild(tbl); subCard.appendChild(wrap);
  } else {
    const msg=d('empty'); msg.textContent='No submission data yet.'; subCard.appendChild(msg);
  }
  c.appendChild(subCard);

  // Draw chart after paint
  requestAnimationFrame(()=>setTimeout(()=>{
    if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
    const ctx=document.getElementById('cls-chart'); if(!ctx)return;
    S.chartInst=new Chart(ctx,{
      type:'bar',
      data:{
        labels:S.classPerf.map(r=>r.class_name),
        datasets:[{label:'Average',data:S.classPerf.map(r=>parseFloat(r.average_score||0)),backgroundColor:'rgba(30,58,95,.72)',borderColor:'#1e3a5f',borderWidth:1}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{color:'#6b7b6b'},grid:{color:'rgba(0,0,0,.05)'}},x:{ticks:{color:'#6b7b6b',maxRotation:45},grid:{display:false}}}}
    });
  },60));
  return c;
}

async function uploadAvatar(file, prefix) {
  const folder = prefix === 'pupils' ? 'pupil_avatars' : 'teacher_avatars';
  const publicId = `${folder}_${Date.now()}`;
  
  const formData = new FormData();
  formData.append('file', file);
  formData.append('api_key', CLOUDINARY.apiKey);
  formData.append('public_id', publicId);
  formData.append('cloud_name', CLOUDINARY.cloudName);
  formData.append('folder', folder);
  formData.append('upload_preset', 'gh_hillview');
  formData.append('timestamp', Math.round(Date.now() / 1000).toString());
  
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/image/upload`, {
    method: 'POST',
    body: formData
  });
  
  const data = await res.json();
  if (data.secure_url) {
    console.log('Cloudinary upload success:', data.secure_url);
    return data.secure_url;
  }
  console.error('Cloudinary upload failed:', data);
  flashToast('Upload failed. Check console for details.', 'err');
  return null;
}

async function getAvatarUrl(path) {
  if (!path) return null;
  try {
    const res = await fetch(path);
    if (!res.ok) return path;
    const blob = await res.blob();
    return URL.createObjectURL(blob);
  } catch {
    return path;
  }
}

function triggerAvatarUpload(pupilId) {
  const fileInput = document.createElement('input');

  fileInput.addEventListener('change', async ev => {
    if (!ev.target.files[0]) return;
    processAndUploadAvatar(ev.target.files[0], pupilId, 'pupils');
  });
  document.body.appendChild(fileInput);
  fileInput.click();
  setTimeout(() => fileInput.remove(), 5000);
}

function processAndUploadAvatar(file, entityId, prefix) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = async function() {
      const SIZE = 300;
      const canvas = document.createElement('canvas');
      canvas.width = SIZE; canvas.height = SIZE;
      const ctx = canvas.getContext('2d');
      const minDim = Math.min(img.width, img.height);
      const sx = (img.width - minDim) / 2;
      const sy = (img.height - minDim) / 2;
      ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, SIZE, SIZE);
      canvas.toBlob(async function(blob) {
        if (!blob) { flashToast('Image processing failed.', 'err'); return; }
        const croppedFile = new File([blob], file.name, {type: 'image/jpeg'});
        const url = await uploadAvatar(croppedFile, prefix);
        if (url) {
          if (prefix === 'pupils') {
            await db.from('pupils').update({avatar: url}).eq('id', entityId);
            const p = S.pupilsList.find(x => x.id === entityId);
            if (p) p.avatar = url;
            await loadPupilsList();
          } else {
            await db.from('users').update({avatar: url}).eq('id', entityId);
            const t = S.teachersList.find(x => x.id === entityId);
            if (t) t.avatar = url;
            await loadTeachersList();
          }
          flashToast('Avatar uploaded!', 'ok');
        } else {
          flashToast('Upload failed. Check bucket permissions.', 'err');
        }
      }, 'image/jpeg', 0.85);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

    const delBtn = e('button', {class: 'btn btn-danger btn-sm'});
    delBtn.textContent = '✕'; delBtn.title = 'Delete teacher';
    delBtn.addEventListener('click', () => deleteTeacher(t));
    acts.appendChild(edBtn); acts.appendChild(avBtn); acts.appendChild(delBtn);
    card.appendChild(acts);
    c.appendChild(card);
  });

  return c;
}

function triggerTeacherAvatarUpload(teacherId) {
  const fileInput = document.createElement('input');
  fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
  fileInput.addEventListener('change', ev => {
    if (!ev.target.files[0]) return;
    processAndUploadAvatar(ev.target.files[0], teacherId, 'teachers');
  });
  document.body.appendChild(fileInput);
  fileInput.click();
  setTimeout(() => fileInput.remove(), 5000);
}

async function openTeacherModal(teacher) {
  const isNew = !teacher;
  let existingClassIds = [];
  if (!isNew) {
    const {data: tcData} = await db.from('teacher_classes').select('class_id').eq('teacher_id', teacher.id);
    existingClassIds = (tcData || []).map(tc => tc.class_id);
    if (existingClassIds.length === 0 && teacher.class_id) {
      existingClassIds = [teacher.class_id];
    }
  }
  S.teacherClassIds = existingClassIds;
  
  const overlay = d('modal-overlay');
  const box = d('modal-box');
  const title = e('div', {class: 'modal-h'}); title.textContent = isNew ? 'Create New Teacher' : 'Edit Teacher';
  box.appendChild(title);

  const nameIn = e('input', {type: 'text', placeholder: 'Full name', id: 'tm-name'});
  if (!isNew) nameIn.value = teacher.name || '';
  const nameGroup = d('form-group');
  const nameLabel = e('label'); nameLabel.textContent = 'Full Name';
  nameGroup.appendChild(nameLabel); nameGroup.appendChild(nameIn); box.appendChild(nameGroup);

  const emailIn = e('input', {type: 'email', placeholder: 'email@example.com', id: 'tm-email'});
  if (!isNew) emailIn.value = teacher.email || '';
  const emailGroup = d('form-group');
  const emailLabel = e('label'); emailLabel.textContent = 'Email';
  emailGroup.appendChild(emailLabel); emailGroup.appendChild(emailIn); box.appendChild(emailGroup);

  const roleGroup = d('form-group');
  const roleLabel = e('label'); roleLabel.textContent = 'Role';
  const roleSel = e('select', {id: 'tm-role'});
  ['teacher', 'admin'].forEach(r => {
    const o = e('option', {value: r}); o.textContent = r.charAt(0).toUpperCase() + r.slice(1);
    if (!isNew && teacher.role === r) o.selected = true;
    roleSel.appendChild(o);
  });
  roleGroup.appendChild(roleLabel); roleGroup.appendChild(roleSel); box.appendChild(roleGroup);

  const clsGroup = d('form-group');
  const clsLabel = e('label'); clsLabel.textContent = 'Assigned Classes (Ctrl+Click for multiple)';
  const clsSel = e('select', {id: 'tm-class', multiple: true, style: 'height:120px'});
  S.classes.forEach(cl => {
    const o = e('option', {value: cl.id}); o.textContent = cl.name;
    if (!isNew && teacher.class_id === cl.id) o.selected = true;
    if (!isNew && S.teacherClassIds?.includes(cl.id)) o.selected = true;
    clsSel.appendChild(o);
  });
  clsGroup.appendChild(clsLabel); clsGroup.appendChild(clsSel); box.appendChild(clsGroup);

  const pwGroup = d('form-group');
  const pwLabel = e('label'); pwLabel.textContent = isNew ? 'Temporary Password' : 'Password (admin only)';
  const pwIn = e('input', {type: 'password', placeholder: '••••••••', id: 'tm-pw'});
  if (!isNew) pwIn.disabled = true;
  pwGroup.appendChild(pwLabel); pwGroup.appendChild(pwIn); box.appendChild(pwGroup);

  const foot = d('modal-foot');
  const cancelBtn = e('button', {class: 'btn btn-ghost'}); cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => overlay.remove());
  const saveBtn = e('button', {class: 'btn btn-primary'});
  saveBtn.textContent = isNew ? 'Create Teacher' : 'Save Changes';

  saveBtn.addEventListener('click', async () => {
    const name = nameIn.value.trim();
    const email = emailIn.value.trim();
    const role = roleSel.value;
    const selectedOptions = [...clsSel.selectedOptions].map(o => o.value);
    const classId = selectedOptions[0] || null; // First selected for users.class_id
    const assignedClassIds = selectedOptions; // All selected for teacher_classes
    const pw = pwIn.value;
    if (!name) { flashToast('Name is required', 'err'); return; }
    saveBtn.disabled = true; saveBtn.innerHTML = '<span class="spin"></span>';
    if (isNew) {
      if (!email || !pw) { flashToast('Email and password required', 'err'); saveBtn.disabled = false; saveBtn.textContent = 'Create Teacher'; return; }
      try {
        const redirectUrl = window.location.origin + window.location.pathname;
        const {data: authUser, error: authErr} = await db.auth.signUp({email, password: pw, options: {data: {name, role, class_id: classId}, emailRedirectTo: redirectUrl}});
        if (authErr) { 
          if (authErr.message.includes('429') || authErr.message.includes('rate limit')) {
            flashToast('Rate limited. Wait a moment then try again.', 'err');
          } else {
            flashToast('Auth error: ' + authErr.message, 'err');
          }
          saveBtn.disabled = false; saveBtn.textContent = 'Create Teacher'; return; 
        }
        if (!authUser || !authUser.user) { flashToast('Signup failed.', 'err'); saveBtn.disabled = false; saveBtn.textContent = 'Create Teacher'; return; }
        const newUser = authUser.user;
        // The users row is created by a database trigger on auth.users.
        // Add to teacher_classes for all selected classes
        for (const cid of assignedClassIds) {
          try {
            const {error: insErr} = await db.from('teacher_classes').insert({teacher_id: newUser.id, class_id: cid});
            if (insErr) console.warn('Insert teacher_classes error:', insErr);
          } catch(e) { console.warn('Insert catch:', e); }
        }
        console.log('Created teacher with classes:', assignedClassIds);
        S.teachersList.push({id: newUser.id, name, email, role, class_id: classId});
        // Send password reset email
        const resetRedirect = window.location.origin + window.location.pathname;
        const {error: resetErr} = await db.auth.resetPasswordForEmail(email, {redirectTo: resetRedirect + '#reset-password'});
        if (resetErr) console.warn('Reset email failed:', resetErr);
        flashToast('Teacher created! Password reset email sent to ' + email, 'ok');
      } catch (err) {
        flashToast('Signup unavailable. Create user in Supabase dashboard.', 'err');
        saveBtn.disabled = false; saveBtn.textContent = 'Create Teacher';
        return;
      }
    } else {
      const updates = {name, role, class_id: classId};
      if (email) updates.email = email;
      await db.from('users').update(updates).eq('id', teacher.id);
      // Update teacher_classes - delete existing and re-insert
      try {
        const {error: delErr} = await db.from('teacher_classes').delete().eq('teacher_id', teacher.id);
        if (delErr) console.warn('Delete teacher_classes error:', delErr);
        for (const cid of assignedClassIds) {
          try {
            const {error: insErr} = await db.from('teacher_classes').insert({teacher_id: teacher.id, class_id: cid});
            if (insErr) console.warn('Insert teacher_classes error:', insErr);
          } catch(e) { console.warn('Insert catch:', e); }
        }
      } catch(e) { console.warn('Teacher classes update catch:', e); }
      const idx = S.teachersList.findIndex(x => x.id === teacher.id);
      if (idx >= 0) S.teachersList[idx] = {...S.teachersList[idx], ...updates};
    }
    flashToast(isNew ? 'Teacher created!' : 'Teacher updated!', 'ok');
    overlay.remove();
    render();
  });

  foot.appendChild(cancelBtn); foot.appendChild(saveBtn); box.appendChild(foot);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  nameIn.focus();
}

async function deleteTeacher(teacher) {
  if (!confirm(`Remove teacher "${teacher.name}" from the system? (Auth account must be deleted manually in Supabase dashboard)`)) return;
  await db.from('users').delete().eq('id', teacher.id);
  S.teachersList = S.teachersList.filter(x => x.id !== teacher.id);
  flashToast('Teacher removed.', 'ok');
  render();
}

  function renderPasswordSet() {

    const pi=e('input',{type:'password',id:'newpw',placeholder:'••••••••',autocomplete:'new-password'}); pf.appendChild(pi); card.appendChild(pf);
    const pfc=d('field'); const pl2=e('label'); pl2.textContent='Confirm Password'; pfc.appendChild(pl2);

    const doSet=async()=>{
      btn.disabled=true; btn.innerHTML='<span class="spin"></span>&ensp;Setting…';
      const pw=pi.value;
      const cpw=pc.value;
      if(!pw||pw.length<6){flashToast('Password must be at least 6 characters','err');btn.disabled=false;btn.textContent='Set Password';return;}
      if(pw!==cpw){flashToast('Passwords do not match','err');btn.disabled=false;btn.textContent='Set Password';return;}
      try {
        const {error} = await db.auth.updateUser({password:pw});
        if(error){flashToast('Error: '+error.message,'err');btn.disabled=false;btn.textContent='Set Password';return;}
        await db.auth.signOut();
        flashToast('Password set! You can now sign in.','ok');
        window.location.href=window.location.pathname;
      } catch(e) {
        flashToast('Error setting password. Link may have expired.', 'err');
        btn.disabled=false; btn.textContent='Set Password';
      }
    };
    btn.addEventListener('click',doSet);

    wrap.appendChild(card); root.appendChild(wrap);
  }

function render() {
  const root=document.getElementById('app'); root.innerHTML='';
  if(!S.user){renderLogin();return;}
  if(S.loading){
    const app=d('','display:flex;flex-direction:column;min-height:100vh');
    app.appendChild(renderNavbar());
    const ld=d('loader'); ld.innerHTML=`<div class="spin"></div>&ensp;Loading…`; app.appendChild(ld);
    root.appendChild(app); return;
  }

  const app=d('','display:flex;flex-direction:column;min-height:100vh');
  app.appendChild(renderNavbar());
  const ml=d('main');
  const isAdmin=S.user.role==='admin';

  let navItems, contentEl;
  if(isAdmin){
    navItems=[
      {id:'overview', label:'Overview',    icon:'<rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/>'},
      {id:'marks',    label:'Class Marks', icon:'<path d="M1 4h14M1 8h14M1 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
      {id:'reports',  label:'Reports',     icon:'<path d="M3 2h10l3 3v13H3V2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6 9h6M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
      {id:'pupils',   label:'Pupil Management', icon:'<path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/>'},
      {id:'teachers', label:'Teacher Management', icon:'<path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/><path d="M16 6v-2M8 6V4M8 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
      {id:'settings', label:'Settings',    icon:'<path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm6.5-1h-1.7l-.4-2H10.6l-.4 2H8.5v1.8l1.5 1v1.5l-1.5 1v1.8h1.7l.4 2h2.7l.4-2h1.5l.4 2h1.7v-1.8l-1.5-1v-1.5l1.5-1V9zM12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" fill="currentColor"/>'},
    ];
    if(S.view==='overview') contentEl=ViewOverview();
    else if(S.view==='marks') contentEl=ViewMarks();
    else if(S.view==='reports') contentEl=ViewReports();
    else if(S.view==='pupils') contentEl=ViewPupils();
    else if(S.view==='teachers') contentEl=ViewTeachers();
    else if(S.view==='settings') contentEl=ViewSettings();
    else contentEl=ViewReports();
  } else {
    navItems=[
      {id:'marks',  label:'Enter Marks',icon:'<path d="M1 4h14M1 8h14M1 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'},
      {id:'summary',label:'Summary',    icon:'<path d="M2 12l5-5 4 4 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'},
    ];
    contentEl=S.view==='summary'?TeacherSummary():TeacherMarks();
  }

  const sb=e('aside',{class:'sidebar'});
  navItems.forEach(({id,label,icon})=>{
    const btn=e('button',{class:'nav-item'+(S.view===id?' active':'')});
    btn.innerHTML=`<span class="nav-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none">${icon}</svg></span><span>${label}</span>`;
    btn.addEventListener('click',()=>{
      S.view=id;
      if(window.innerWidth<=640) toggleSidebar();
      if(id==='pupils'){
        if(!S.pupilsList.length && !pupilsLoading) loadPupilsList();
        render();
      } else if(id==='teachers'){
        if(!S.teachersList.length && !teachersLoading) loadTeachersList();
        render();
      } else if(id==='reports'&&!S.reportPupils.length){
        S.reportSummary=null;
        loadReportPupils();
        render();
      } else {
        render();
      }
    }); sb.appendChild(btn);
  });

  ml.appendChild(sb); ml.appendChild(contentEl); app.appendChild(ml);
  const overlay=e('div',{class:'sidebar-overlay',id:'sidebarOverlay'});
  overlay.addEventListener('click',toggleSidebar);
  app.appendChild(overlay);

function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('sidebarOverlay');
  if(sb) sb.classList.toggle('open');
  if(ov) ov.classList.toggle('open');
}

// ══════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════
(async function boot(){
  const hash = window.location.hash;
  if (hash.includes('type=signup') || hash.includes('type=recovery')) {
    const params = new URLSearchParams(hash.slice(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const token = params.get('token');
    const email = params.get('email');
    if (accessToken && refreshToken) {
      await db.auth.setSession({access_token: accessToken, refresh_token: refreshToken});
      window.location.hash = '';
      renderPasswordSet();
      return;
    } else if (token && email) {
      await db.auth.setSession({access_token: token, refresh_token: token});
      window.location.hash = '';
      renderPasswordSet();
      return;
    }
  }
  const {data:{session}}=await db.auth.getSession();
  if(session){
    const {data:u,error:uErr}=await db.from('users').select('id,name,email,role,class_id,avatar').eq('id',session.user.id).limit(1);
    if(!uErr&&u&&u.length>0){const profile=u[0];S.user=profile;S.view=profile.role==='admin'?'overview':'marks';await loadAll();return;}
  }
  S.loading=false; render();
  db.auth.onAuthStateChange(ev=>{
    if(ev==='SIGNED_OUT'){unsubscribeAll();Object.assign(S,{user:null,loading:false,classes:[],subjects:[],pupils:[],marksMap:{},commentsMap:{},classPerf:[],submissions:[],selClass:null,teacherClassIds:[],selPupilClass:null,pending:{},saving:false,saveMsg:null,reportPupils:[],reportSelId:null,reportSummary:null,reportSubjects:[],pupilsList:[],teachersList:[],teachersLoaded:false,pupilsLoaded:false});render();}
  });
})();
